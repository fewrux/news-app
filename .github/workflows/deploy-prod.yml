name: deploy-prod

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy_production:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - run: npm install --global vercel@latest

      - name: Verify Vercel token
        run: vercel whoami --token=${{ secrets.VERCEL_TOKEN }}

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > .vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy production
        id: deploy
        run: |
          url=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Write release artifact
        run: |
          mkdir -p .sdlc/releases
          ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          sha=${GITHUB_SHA::7}
          cat > .sdlc/releases/${ts}-${sha}.md <<EOF
          ---
          id: REL-${ts}-${sha}
          commit: ${GITHUB_SHA}
          deployment_url: ${{ steps.deploy.outputs.url }}
          deployed_at: ${ts}
          ---
          EOF
