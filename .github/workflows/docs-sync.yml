name: docs-sync

# Mirrors every Markdown file under docs/ to Plane as a native Page.
# Idempotent: paths already recorded in docs/.plane-pages.json are
# skipped; new paths are POSTed and recorded.
#
# IMPORTANT: This workflow runs the sync but does NOT auto-commit
# updated docs/.plane-pages.json back to main (that would require
# pushing to a protected branch). The supported flow is:
#   1. Author edits docs/*.md locally on a feature branch.
#   2. Author runs `npm run plane:sync:docs` locally to create any new
#      pages and update docs/.plane-pages.json.
#   3. Author commits the updated state file alongside the doc edits.
#   4. PR merges to main; this workflow runs and is effectively a
#      no-op (everything is already mapped) — except when the local
#      step was skipped, in which case this run will create the missing
#      pages but the new ids will not be persisted to the repo, risking
#      duplicates on the next run. Treat that as a recoverable mistake:
#      delete the duplicates in Plane UI and re-run locally.
#
# Triggers:
#   - push to main that touches docs/ or the sync script
#   - manual dispatch (for ad-hoc resync after env / Plane changes)

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/plane-sync.mjs"
      - ".github/workflows/docs-sync.yml"
  workflow_dispatch:

# Serialize: never run two syncs at once, and let the latest run win.
concurrency:
  group: docs-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (lockfile only)
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Mirror docs/ → Plane pages
        env:
          PLANE_API_BASE: ${{ secrets.PLANE_API_BASE }}
          PLANE_API_TOKEN: ${{ secrets.PLANE_API_TOKEN }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_PROJECT_ID: ${{ secrets.PLANE_PROJECT_ID }}
        run: node scripts/plane-sync.mjs sync-docs docs
