name: plane-sync

on:
  pull_request:
    types: [opened, edited, ready_for_review]
  issues:
    types: [opened, edited, closed]

jobs:
  sync:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci --no-audit --no-fund

      - name: Sync to Plane
        env:
          PLANE_API_BASE: ${{ secrets.PLANE_API_BASE }}
          PLANE_API_TOKEN: ${{ secrets.PLANE_API_TOKEN }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_PROJECT_ID: ${{ secrets.PLANE_PROJECT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node scripts/plane-sync.mjs github-event
