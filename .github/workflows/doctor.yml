name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: doctor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  doctor:
    name: doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - name: Run SDLC doctor (mechanical)
        id: doctor
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/sdlc-doctor.mjs --mode=mechanical 2> /tmp/doctor-summary.txt | tee /tmp/doctor-report.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post doctor summary on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('/tmp/doctor-summary.txt', 'utf8');
            const marker = '<!-- sdlc-doctor -->';
            const body = `${marker}\n## SDLC doctor (advisory)\n\n\`\`\`\n${summary.trim()}\n\`\`\`\n\nMechanical layer only. \`ci/doctor\` is advisory until promoted per ADR-0003.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Report exit code (advisory — does not fail the job)
        run: |
          echo "Doctor mechanical exit: ${{ steps.doctor.outputs.exit_code }}"
          echo "Advisory only — see ADR-0003 Option 3C."
