name: doctor-weekly

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  doctor_weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - name: Run SDLC doctor (mechanical — agentic layer deferred to Cursor)
        id: run
        run: |
          set +e
          node scripts/sdlc-doctor.mjs --mode=mechanical 2> /tmp/doctor-summary.txt | tee /tmp/doctor-report.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          fails=$(node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/doctor-report.json','utf8')); console.log(r.summary.fail)")
          echo "fail_count=$fails" >> "$GITHUB_OUTPUT"

      - name: File Plane issue on fail findings
        if: steps.run.outputs.fail_count != '0'
        env:
          PLANE_API_BASE: ${{ secrets.PLANE_API_BASE }}
          PLANE_API_TOKEN: ${{ secrets.PLANE_API_TOKEN }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_PROJECT_ID: ${{ secrets.PLANE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${PLANE_API_BASE:-}" ] || [ -z "${PLANE_API_TOKEN:-}" ]; then
            echo "Plane env unset — skipping issue creation (noop dry-run)."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          INC=".sdlc/incidents/INC-${DATE}-doctor-weekly.md"
          mkdir -p .sdlc/incidents
          cat > "$INC" <<EOF
          ---
          id: INC-${DATE}-doctor-weekly
          status: open
          severity: low
          created_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          provenance:
            agent_id: operator
            model: ""
            prompt_hash: ""
            trace_id: ""
            inputs_digest: ""
          ---

          # Incident — weekly doctor fail findings

          Mechanical doctor reported ${steps.run.outputs.fail_count} fail finding(s).
          See workflow run and /tmp/doctor-summary.txt artifact in logs.

          ## Next steps

          Run \`/doctor\` in Cursor for the semantic layer and file cleanup intents.
          EOF
          node scripts/plane-sync.mjs create-from-incident "$INC" || echo "Plane sync soft-failed"

      - name: Noop when clean
        if: steps.run.outputs.fail_count == '0'
        run: echo "Doctor weekly — no fail findings."
