name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    # Guards the SDLC discovery surface: if any of these entry points
    # disappear, sessions start the next morning without context. The
    # contract is .sdlc/sdlc.yaml; the human/agent on-ramps below MUST
    # exist for that contract to be findable.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert SDLC entry-point files exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            AGENTS.md
            CLAUDE.md
            README.md
            .sdlc/sdlc.yaml
            .sdlc/INDEX.md
            .sdlc/memories/project.md
            .sdlc/memories/lessons.md
            .sdlc/memories/glossary.md
            .cursor/INDEX.md
            .cursor/hooks.json
            .cursor/hooks/load-context.mjs
            .cursor/hooks/guard-shell.mjs
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::missing SDLC entry-point file"
              missing=1
            fi
          done
          exit "$missing"
      - name: Assert sessionStart + beforeShellExecution hooks are registered
        shell: bash
        run: |
          set -euo pipefail
          grep -q '"sessionStart"' .cursor/hooks.json
          grep -q 'load-context.mjs'  .cursor/hooks.json
          grep -q '"beforeShellExecution"' .cursor/hooks.json
          grep -q 'guard-shell.mjs'    .cursor/hooks.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci --no-audit --no-fund
      - run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

  review-gate:
    if: github.event.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci --no-audit --no-fund
      - name: gate.review_approved (PR comment, ADR-0007)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/check-phase-exit.mjs --phase review --pr "$PR_NUMBER"

  verify-gate:
    if: github.event.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci --no-audit --no-fund
      - name: Resolve spec path from PR body
        id: spec
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          spec=$(printf '%s' "$PR_BODY" | grep -oE 'SPEC-[0-9]+' | head -1 || true)
          if [ -z "$spec" ]; then
            echo "::error::PR body must include SPEC-NNNN for verify-gate (hard gate)"
            exit 1
          fi
          path=$(ls .sdlc/specs/${spec}-*.md 2>/dev/null | head -1 || true)
          if [ -z "$path" ]; then
            echo "::error::Spec file not found for ${spec}"
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
      - name: gate.verify (Plane comment, ADR-0007)
        env:
          PLANE_API_BASE: ${{ secrets.PLANE_API_BASE }}
          PLANE_API_TOKEN: ${{ secrets.PLANE_API_TOKEN }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_PROJECT_ID: ${{ secrets.PLANE_PROJECT_ID }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node scripts/check-phase-exit.mjs --phase verify --spec "${{ steps.spec.outputs.path }}" --head-sha "$HEAD_SHA"
